services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guiche
      POSTGRES_USER: guiche
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guiche_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guiche -d guiche"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      network: host
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://guiche:${POSTGRES_PASSWORD:-guiche_secret}@db:5432/guiche
      SESSION_SECRET: ${SESSION_SECRET:-troque_em_producao_$(openssl rand -hex 32)}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Vite build → nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      network: host
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
